<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luka Pintar KKM</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    .font-poppins { font-family: 'Poppins', sans-serif !important; }
    .font-inter { font-family: 'Inter', sans-serif !important; }

    @keyframes scan {
      0% { transform: translateY(-100%); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(6400%); opacity: 0; }
    }
    .animate-scan { animation: scan 2s linear infinite; }
    
    @keyframes progress {
      0% { width: 0%; }
      100% { width: 100%; }
    }
    .animate-progress { animation: progress 4s ease-in-out forwards; }
    
    .hidden-view { display: none !important; }
  </style>
</head>
<body class="min-h-screen bg-slate-50/80 font-inter text-slate-900 pb-20 selection:bg-indigo-100 selection:text-indigo-900">

  <header class="bg-white border-b border-slate-100 shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3 group cursor-pointer" onclick="switchTab('dashboard')">
        <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-blue-600 rounded-xl flex items-center justify-center shadow-md group-hover:scale-105 transition-transform">
          <i data-lucide="activity" class="w-6 h-6 text-white"></i>
        </div>
        <div>
          <h1 class="font-extrabold text-2xl leading-tight text-slate-800 bg-clip-text text-transparent bg-gradient-to-r from-indigo-700 to-blue-600 font-poppins">Luka Pintar KKM</h1>
          <p class="text-[10px] uppercase font-bold tracking-wider text-slate-400 mt-0.5">Klinik Kesihatan</p>
        </div>
      </div>
      
      <div class="flex items-center gap-5">
        <div class="hidden md:flex items-center text-sm text-slate-500 bg-indigo-50/50 px-4 py-2 rounded-full border border-indigo-100">
          <i data-lucide="clock" class="w-4 h-4 mr-2 text-indigo-500"></i>
          <span id="current-date" class="font-medium"></span>
        </div>
        <div class="flex items-center gap-3 border-l border-slate-100 pl-5 cursor-pointer hover:opacity-80 transition-opacity">
          <div class="w-9 h-9 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-700 font-bold text-sm shadow-inner">
            DK
          </div>
          <div class="hidden md:block text-sm">
            <p class="font-bold text-slate-800 leading-none">Dr. Kamal</p>
            <p class="text-xs text-slate-500 mt-0.5">Presint 9</p>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 mt-8">
    
    <div id="view-dashboard" class="space-y-6 animate-in fade-in duration-300">
      
      <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div>
          <h2 class="text-3xl font-extrabold text-slate-800 tracking-tight font-poppins">Papan Pemuka</h2>
          <p class="text-slate-500 mt-1 text-base">Ringkasan pesakit dan penilaian luka terkini</p>
        </div>
        <div class="flex gap-3">
          <button class="px-5 py-2.5 bg-white border-2 border-indigo-50 text-indigo-700 rounded-full shadow-sm hover:bg-indigo-50 hover:border-indigo-100 hover:-translate-y-0.5 transition-all duration-200 font-medium flex items-center">
            <i data-lucide="user" class="w-4 h-4 mr-2"></i> Daftar Pesakit
          </button>
          <button onclick="switchTab('assessment')" class="px-5 py-2.5 bg-indigo-600 text-white rounded-full shadow-sm hover:bg-indigo-700 hover:-translate-y-0.5 transition-all duration-200 font-medium flex items-center">
            <i data-lucide="plus" class="w-4 h-4 mr-2"></i> Penilaian Baru
          </button>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-6">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
          <div class="p-3 bg-blue-50 text-blue-600 rounded-lg">
            <i data-lucide="users" class="w-6 h-6"></i>
          </div>
          <div>
            <p class="text-sm font-medium text-slate-500">Jumlah Pesakit</p>
            <p class="text-2xl font-bold text-slate-800">124</p>
          </div>
        </div>
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
          <div class="p-3 bg-amber-50 text-amber-600 rounded-lg">
            <i data-lucide="clipboard-list" class="w-6 h-6"></i>
          </div>
          <div>
            <p class="text-sm font-medium text-slate-500">Perlu Rawatan</p>
            <p class="text-2xl font-bold text-slate-800">12</p>
          </div>
        </div>
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
          <div class="p-3 bg-emerald-50 text-emerald-600 rounded-lg">
            <i data-lucide="check-circle" class="w-6 h-6"></i>
          </div>
          <div>
            <p class="text-sm font-medium text-slate-500">Selesai Hari Ini</p>
            <p class="text-2xl font-bold text-slate-800">28</p>
          </div>
        </div>
      </div>

    </div>
  </main>

  <script>
    // 1. Initialize Lucide Icons (Draws the icons on screen)
    lucide.createIcons();

    // 2. Set the current date in the header
    const dateElement = document.getElementById('current-date');
    if (dateElement) {
      const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      dateElement.textContent = new Date().toLocaleDateString('ms-MY', dateOptions);
    }

    // 3. Simple Tab Switcher Placeholder
    function switchTab(tabName) {
      console.log("Switching to tab: " + tabName);
      // Logic to toggle classes can go here later
    }
  </script>
</body>
</html>

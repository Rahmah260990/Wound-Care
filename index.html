<!DOCTYPE html>
<!--
DATABASE SETUP (SUPABASE)
1. Create a Supabase project.
2. Open SQL Editor and run the SQL below.
3. Replace SUPABASE_URL and SUPABASE_PUBLISHABLE_KEY inside this file.

create table public.wound_records (
  id bigint generated by default as identity primary key,
  user_id uuid not null references auth.users(id) on delete cascade,
  patient_id text not null unique,
  name text not null,
  ic text,
  age integer,
  last_visit date default current_date,
  status text default 'Rawatan Aktif',
  bp_sys numeric, bp_dia numeric, temperature numeric, rbs numeric, pain_score integer,
  risk_diabetes boolean default false, risk_hypertension boolean default false,
  risk_pvd boolean default false, risk_smoker boolean default false,
  wound_length numeric, wound_width numeric, wound_depth numeric,
  tissue_granulation integer, tissue_slough integer, tissue_necrotic integer, tissue_epithelial integer,
  moisture text, edge_status text, wound_type text, cleansing text,
  primary_dressing text, secondary_dressing text, tca date,
  created_at timestamptz default now(), updated_at timestamptz default now()
);

alter table public.wound_records enable row level security;
create policy "Users can read own records" on public.wound_records for select using (auth.uid() = user_id);
create policy "Users can insert own records" on public.wound_records for insert with check (auth.uid() = user_id);
create policy "Users can update own records" on public.wound_records for update using (auth.uid() = user_id) with check (auth.uid() = user_id);
create policy "Users can delete own records" on public.wound_records for delete using (auth.uid() = user_id);
-->

<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luka Pintar KKM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .font-poppins { font-family: 'Poppins', sans-serif; }
    @keyframes scan {
      0% { transform: translateY(-100%); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(6400%); opacity: 0; }
    }
    .animate-scan { animation: scan 2s linear infinite; }
    @keyframes progress {
      from { width: 0%; }
      to { width: 100%; }
    }
    .animate-progress { animation: progress 4s ease-in-out forwards; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <header class="bg-white border-b border-slate-100 shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
      <button id="brandBtn" class="flex items-center gap-3 group">
        <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-blue-600 rounded-xl flex items-center justify-center shadow-md group-hover:scale-105 transition-transform">
          <i data-lucide="activity" class="w-6 h-6 text-white"></i>
        </div>
        <div class="text-left">
          <h1 class="font-extrabold text-2xl leading-tight bg-clip-text text-transparent bg-gradient-to-r from-indigo-700 to-blue-600 font-poppins">Luka Pintar KKM</h1>
          <p class="text-[10px] uppercase font-bold tracking-wider text-slate-400 mt-0.5">Klinik Kesihatan</p>
        </div>
      </button>

      <div class="flex items-center gap-5">
        <div class="hidden md:flex items-center text-sm text-slate-500 bg-indigo-50/50 px-4 py-2 rounded-full border border-indigo-100">
          <i data-lucide="clock" class="w-4 h-4 mr-2 text-indigo-500"></i>
          <span id="currentDate" class="font-medium"></span>
        </div>
        <div class="flex items-center gap-3 border-l border-slate-100 pl-5">
          <div class="w-9 h-9 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-700 font-bold text-sm">DK</div>
          <div class="hidden md:block text-sm">
            <p id="userLabel" class="font-bold text-slate-800 leading-none">Belum log masuk</p>
            <button id="logoutBtn" class="text-xs text-indigo-600 mt-0.5 hidden">Log keluar</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 mt-8 pb-20">
    <section id="authView"></section>
    <section id="dashboardView"></section>
    <section id="assessmentView" class="hidden"></section>
  </main>

  <script>
    const CONFIG_KEY = 'lukaPintarSupabaseConfig';
    let db = null;

    let patients = [];
    let currentUser = null;

    let aiStatus = 'idle';
    let imageData = '';

    const authView = document.getElementById('authView');
    const dashboard = document.getElementById('dashboardView');
    const assessment = document.getElementById('assessmentView');

    document.getElementById('currentDate').textContent = new Date().toLocaleDateString('ms-MY', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    function icon(name, cls='w-5 h-5') {
      return `<i data-lucide="${name}" class="${cls}"></i>`;
    }

    function renderDashboard(filter='') {
      const query = filter.toLowerCase();
      const filtered = patients.filter(p => [p.id,p.name,p.ic,p.status].some(v => v.toLowerCase().includes(query)));

      dashboard.innerHTML = `
        <div class="space-y-6">
          <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
              <h2 class="text-3xl font-extrabold text-slate-800 tracking-tight font-poppins">Papan Pemuka</h2>
              <p class="text-slate-500 mt-1">Ringkasan pesakit dan penilaian luka terkini</p>
            </div>
            <div class="flex gap-3">
              <button class="px-5 py-2.5 bg-white border-2 border-indigo-50 text-indigo-700 rounded-full shadow-sm font-medium flex items-center">
                ${icon('user','w-4 h-4 mr-2')} Daftar Pesakit
              </button>
              <button id="newAssessmentBtn" class="px-5 py-2.5 bg-indigo-600 text-white rounded-full shadow-md hover:bg-indigo-500 font-medium flex items-center">
                ${icon('plus','w-4 h-4 mr-2')} Penilaian Baru
              </button>
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
            ${statCard('activity','indigo','Kes Aktif',String(patients.filter(p=>p.status==='Rawatan Aktif').length))}
            ${statCard('circle-check-big','emerald','Luka Sembuh',String(patients.filter(p=>p.status==='Sembuh').length))}
            ${statCard('triangle-alert','amber','Jumlah Rekod',String(patients.length))}
          </div>

          <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="p-5 border-b border-slate-200 flex flex-col md:flex-row justify-between md:items-center gap-3 bg-slate-50/50">
              <h3 class="text-xl font-bold text-slate-800 font-poppins">Senarai Pesakit Semasa</h3>
              <div class="relative">
                ${icon('search','w-4 h-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2')}
                <input id="searchInput" value="${filter}" type="text" placeholder="Cari pesakit..." class="pl-9 pr-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
              </div>
            </div>
            <div class="overflow-x-auto">
              <table class="w-full text-left border-collapse">
                <thead>
                  <tr class="bg-slate-50 text-slate-500 text-sm border-b border-slate-200">
                    <th class="p-4 font-medium">ID Pesakit</th><th class="p-4 font-medium">Nama Pesakit</th>
                    <th class="p-4 font-medium">No. K/P</th><th class="p-4 font-medium">Lawatan Terakhir</th>
                    <th class="p-4 font-medium">Status</th><th class="p-4 font-medium">Tindakan</th>
                  </tr>
                </thead>
                <tbody>
                  ${filtered.map(p => `
                    <tr class="border-b border-slate-100 hover:bg-slate-50">
                      <td class="p-4 text-sm font-medium">${p.id}</td>
                      <td class="p-4 text-sm text-slate-700">${p.name}</td>
                      <td class="p-4 text-sm text-slate-500">${p.ic}</td>
                      <td class="p-4 text-sm text-slate-500">${p.lastVisit}</td>
                      <td class="p-4 text-sm"><span class="px-2.5 py-1 rounded-full text-xs font-medium ${p.status === 'Rawatan Aktif' ? 'bg-blue-100 text-blue-700' : 'bg-emerald-100 text-emerald-700'}">${p.status}</span></td>
                      <td class="p-4 text-sm"><button class="text-blue-600 font-medium flex items-center">Buka Profil ${icon('chevron-right','w-4 h-4 ml-1')}</button></td>
                    </tr>`).join('')}
                </tbody>
              </table>
            </div>
          </div>
        </div>`;

      document.getElementById('newAssessmentBtn').onclick = showAssessment;
      document.getElementById('searchInput').oninput = e => renderDashboard(e.target.value);
      lucide.createIcons();
    }

    function statCard(iconName, color, label, number) {
      return `<div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm flex items-center gap-4">
        <div class="bg-${color}-100 p-3.5 rounded-xl text-${color}-600">${icon(iconName,'w-6 h-6')}</div>
        <div><p class="text-sm text-slate-500 font-medium">${label}</p><h3 class="text-3xl font-bold text-slate-800 font-poppins mt-1">${number}</h3></div>
      </div>`;
    }

    function input(label, name, type='text', placeholder='', extra='') {
      return `<div><label class="block text-xs font-medium text-slate-500 mb-1">${label}</label><input id="${name}" name="${name}" type="${type}" placeholder="${placeholder}" ${extra} class="w-full px-3 py-2 border border-slate-300 rounded-md text-sm focus:ring-2 focus:ring-blue-500" /></div>`;
    }

    function renderAssessment() {
      assessment.innerHTML = `
        <div>
          <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4 mb-6 pb-4 border-b border-slate-200">
            <div class="flex items-center gap-4">
              <button id="backBtn" class="p-2.5 bg-white rounded-full border border-slate-200">${icon('home')}</button>
              <div><h2 class="text-3xl font-extrabold text-slate-800 font-poppins">Penilaian Luka Baharu</h2><p class="text-slate-500 mt-1">Lengkapkan maklumat dan gunakan AI untuk analisis automatik</p></div>
            </div>
            <button id="saveBtn" class="px-6 py-2.5 bg-indigo-600 text-white rounded-full shadow-md font-medium flex items-center">${icon('save','w-4 h-4 mr-2')} Simpan Rekod</button>
          </div>

          <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="space-y-6">
              ${panel('user','text-blue-600','Maklumat Pesakit',`
                <div class="space-y-4">${input('Nama Penuh','name','text','Nama Pesakit')}<div class="grid grid-cols-2 gap-3">${input('No. K/P','ic','text','No. KP')}${input('Umur','age','number','Tahun')}</div></div>`)}
              ${panel('activity','text-rose-500','Tanda Vital',`
                <div class="grid grid-cols-2 gap-4">${input('BP Sistolik','bpSys','number','120')}${input('BP Diastolik','bpDia','number','80')}${input('Suhu (°C)','temp','number','37.0','step="0.1"')}${input('RBS (mmol/L)','rbs','number','5.5','step="0.1"')}${input('Pain Score','painScore','number','0','min="0" max="10"')}</div>`)}
              ${panel('stethoscope','text-slate-600','Faktor Risiko / Komorbid',`
                <div class="grid grid-cols-2 gap-3">${[['riskDiabetes','Diabetes'],['riskHypertension','Hypertension'],['riskPVD','PVD'],['riskSmoker','Perokok']].map(([id,x])=>`<label class="flex items-center gap-2 text-sm"><input id="${id}" type="checkbox" class="w-4 h-4">${x}</label>`).join('')}</div>`)}
            </div>

            <div class="space-y-6 lg:col-span-2">
              <div class="bg-gradient-to-br from-slate-900 to-slate-800 rounded-xl p-5 shadow-lg text-white">
                <div class="flex items-center gap-3 mb-4"><div class="bg-blue-500/20 p-2 rounded-lg text-blue-400">${icon('camera','w-6 h-6')}</div><div><h3 class="font-bold text-lg">Pengimbas Luka AI <span class="bg-blue-500 text-[10px] px-2 py-0.5 rounded-full">DEMO</span></h3><p class="text-xs text-slate-400">Dimensi geometri dan klasifikasi tisu automatik</p></div></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-center">
                  <div id="imageArea" class="relative"><div id="dropZone" class="border-2 border-dashed border-slate-600 rounded-xl h-56 flex flex-col items-center justify-center cursor-pointer hover:border-blue-400">${icon('upload-cloud','w-10 h-10 text-slate-500 mb-3')}<p class="text-sm text-slate-400">Klik untuk muat naik imej luka</p><p class="text-xs text-slate-500 mt-1">JPG atau PNG</p></div><input id="fileInput" type="file" accept="image/*" class="hidden"></div>
                  <div id="aiPanel"><p class="text-slate-400 text-sm border-l-2 border-slate-700 pl-4 py-2">Muat naik gambar luka untuk memulakan simulasi analisis T.I.M.E.</p></div>
                </div>
              </div>

              ${timePanel()}
              ${carePlanPanel()}
            </div>
          </div>
        </div>`;

      document.getElementById('backBtn').onclick = showDashboard;
      document.getElementById('brandBtn').onclick = showDashboard;
      document.getElementById('dropZone').onclick = () => document.getElementById('fileInput').click();
      document.getElementById('fileInput').onchange = handleImage;
      document.getElementById('saveBtn').onclick = saveRecord;
      lucide.createIcons();
    }

    function panel(iconName, colorClass, title, body) {
      return `<div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm"><div class="flex items-center gap-2 mb-4 border-b border-slate-100 pb-3">${icon(iconName,`w-5 h-5 ${colorClass}`)}<h3 class="font-bold text-slate-800">${title}</h3></div>${body}</div>`;
    }

    function timePanel() {
      return `<div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
        <div class="bg-slate-50 border-b border-slate-200 p-4"><h3 class="font-bold flex items-center gap-2">${icon('file-text','w-5 h-5 text-blue-600')} Penilaian T.I.M.E</h3></div>
        <div class="p-5 space-y-6">
          <div><h4 class="text-sm font-bold mb-3 border-b pb-1">Ukuran Luka (cm)</h4><div class="grid grid-cols-3 gap-4">${input('Panjang','woundLength','number','','step="0.1"')}${input('Lebar','woundWidth','number','','step="0.1"')}${input('Kedalaman','woundDepth','number','','step="0.1"')}</div></div>
          <div><h4 class="text-sm font-bold mb-3 border-b pb-1">T - Tissue / Tisu (%)</h4><div class="grid grid-cols-2 md:grid-cols-4 gap-4">${input('Granulation','tissueGranulation','number','0','min="0" max="100"')}${input('Slough','tissueSlough','number','0','min="0" max="100"')}${input('Necrotic','tissueNecrotic','number','0','min="0" max="100"')}${input('Epithelial','tissueEpithelial','number','0','min="0" max="100"')}</div></div>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div><h4 class="text-sm font-bold mb-3 border-b pb-1">I - Infection</h4>${['Kemerahan','Nanah','Panas','Berbau'].map(x=>`<label class="flex items-center gap-2 text-sm mb-2"><input type="checkbox">${x}</label>`).join('')}</div>
            <div><h4 class="text-sm font-bold mb-3 border-b pb-1">M - Moisture</h4><select id="moisture" class="w-full px-3 py-2 border rounded-md text-sm"><option value="">-- Pilih Tahap --</option><option>Kering</option><option>Minimal</option><option>Sederhana</option><option>Basah / Berat</option></select></div>
            <div><h4 class="text-sm font-bold mb-3 border-b pb-1">E - Edge</h4><select id="edge" class="w-full px-3 py-2 border rounded-md text-sm"><option value="">-- Pilih Status --</option><option>Sihat</option><option>Macerated</option><option>Excoriated</option><option>Rolled</option><option>Callus</option></select></div>
          </div>
        </div>
      </div>`;
    }

    function carePlanPanel() {
      return `<div class="bg-white rounded-xl border border-blue-200 shadow-sm overflow-hidden"><div class="bg-blue-50 border-b border-blue-100 p-4"><h3 class="font-bold text-blue-900 flex items-center gap-2">${icon('syringe','w-5 h-5 text-blue-600')} Pelan Perawatan</h3></div><div class="p-5 grid grid-cols-1 md:grid-cols-2 gap-5">
        ${selectField('Jenis Luka','woundType',['Jenis 1 (Epithelialising)','Jenis 2 (Granulating)','Jenis 3 (Sloughy)','Jenis 4 (Sloughy & Exudating)','Jenis 5 (Necrotic)','Jenis 6 (Infected)','Jenis 7 (Malignant)','Jenis 8 (Atypical)'])}
        ${selectField('Larutan Pencuci','cleansing',['Normal Saline (0.9%)','PHMB Solution','Superoxidised Solution','Povidone Iodine'])}
        ${selectField('Pembalut Utama','primaryDressing',['Hydrogel','Alginate / Hydrofiber','Silver / Antimicrobial','Medical Honey','Foam'])}
        ${selectField('Pembalut Kedua','secondaryDressing',['Gauze & Bandage','Foam Dressing','Transparent Film','Tulle Gras'])}
        <div class="md:col-span-2">${input('Temujanji Seterusnya','tca','date')}</div>
      </div></div>`;
    }

    function selectField(label,id,options) {
      return `<div><label class="block text-sm font-semibold text-slate-700 mb-1">${label}</label><select id="${id}" class="w-full px-3 py-2 border border-slate-300 rounded-md text-sm"><option value="">-- Pilih --</option>${options.map(o=>`<option>${o}</option>`).join('')}</select></div>`;
    }

    function handleImage(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        imageData = ev.target.result;
        document.getElementById('imageArea').innerHTML = `<div class="relative rounded-xl overflow-hidden h-64 border border-slate-700 bg-black flex items-center justify-center"><img src="${imageData}" class="max-h-full max-w-full object-contain"><button id="removeImage" class="absolute top-2 right-2 p-2 bg-black/60 rounded-full">${icon('x','w-4 h-4')}</button></div>`;
        document.getElementById('aiPanel').innerHTML = `<button id="analyzeBtn" class="w-full py-3 bg-blue-600 hover:bg-blue-500 rounded-lg font-bold flex items-center justify-center">${icon('activity','w-5 h-5 mr-2')} Mula Analisis AI Pintar</button>`;
        document.getElementById('removeImage').onclick = () => { imageData=''; renderAssessment(); };
        document.getElementById('analyzeBtn').onclick = runAnalysis;
        lucide.createIcons();
      };
      reader.readAsDataURL(file);
    }

    function runAnalysis() {
      const panel = document.getElementById('aiPanel');
      panel.innerHTML = `<div class="space-y-3"><div class="flex justify-between text-sm"><span class="text-blue-400 font-medium">Sedang diproses...</span><span class="text-slate-400">~4s</span></div><div class="w-full bg-slate-800 rounded-full h-1.5"><div class="bg-blue-500 h-1.5 rounded-full animate-progress"></div></div><div id="logBox" class="bg-slate-900 rounded-lg p-3 border border-slate-700 font-mono text-xs text-emerald-400 h-28 overflow-y-auto"></div></div>`;
      const logs = ['Memuatkan model AI Kesihatan...','Menganalisis dimensi geometri luka...','Mengelaskan jenis tisu...','Mengesan eksudat dan tepi luka...'];
      logs.forEach((log,i)=>setTimeout(()=>{document.getElementById('logBox').innerHTML += `&gt; ${log}<br>`;},500+i*800));
      setTimeout(()=>{
        setValue('woundLength','5.2'); setValue('woundWidth','3.4'); setValue('woundDepth','0.8');
        setValue('tissueGranulation','60'); setValue('tissueSlough','40'); setValue('tissueNecrotic','0'); setValue('tissueEpithelial','0');
        setValue('moisture','Sederhana'); setValue('edge','Macerated'); setValue('woundType','Jenis 4 (Sloughy & Exudating)'); setValue('cleansing','PHMB Solution'); setValue('primaryDressing','Alginate / Hydrofiber'); setValue('secondaryDressing','Foam Dressing'); setValue('tca','2026-07-10');
        panel.innerHTML = `<div class="bg-emerald-900/30 border border-emerald-500/30 rounded-lg p-4"><div class="flex items-center text-emerald-400 font-bold mb-2">${icon('circle-check-big','w-5 h-5 mr-2')} Analisis Selesai</div><p class="text-xs text-emerald-100/70">Parameter demo telah diisi secara automatik. Sila semak dan sahkan ketepatan.</p></div>`;
        lucide.createIcons();
      },4200);
    }

    function setValue(id,value){ const el=document.getElementById(id); if(el) el.value=value; }

    function value(id) { const el=document.getElementById(id); return el ? el.value : ''; }
    function checked(id) { const el=document.getElementById(id); return el ? el.checked : false; }
    function num(id) { const v=value(id); return v === '' ? null : Number(v); }

    async function saveRecord() {
      if (!currentUser) { alert('Sila log masuk dahulu.'); return; }
      const name = value('name').trim();
      if (!name) { alert('Sila masukkan nama pesakit terlebih dahulu.'); return; }
      const button=document.getElementById('saveBtn');
      button.disabled=true; button.textContent='Sedang menyimpan...';
      const patientId = 'PT' + Date.now().toString().slice(-8);
      const payload = {
        user_id: currentUser.id, patient_id: patientId, name, ic: value('ic'), age: num('age'),
        last_visit: new Date().toISOString().slice(0,10), status: 'Rawatan Aktif',
        bp_sys:num('bpSys'), bp_dia:num('bpDia'), temperature:num('temp'), rbs:num('rbs'), pain_score:num('painScore'),
        risk_diabetes:checked('riskDiabetes'), risk_hypertension:checked('riskHypertension'), risk_pvd:checked('riskPVD'), risk_smoker:checked('riskSmoker'),
        wound_length:num('woundLength'), wound_width:num('woundWidth'), wound_depth:num('woundDepth'),
        tissue_granulation:num('tissueGranulation'), tissue_slough:num('tissueSlough'), tissue_necrotic:num('tissueNecrotic'), tissue_epithelial:num('tissueEpithelial'),
        moisture:value('moisture'), edge_status:value('edge'), wound_type:value('woundType'), cleansing:value('cleansing'),
        primary_dressing:value('primaryDressing'), secondary_dressing:value('secondaryDressing'), tca:value('tca') || null
      };
      const { error } = await db.from('wound_records').insert(payload);
      button.disabled=false; button.innerHTML=icon('save','w-4 h-4 mr-2')+' Simpan Rekod'; lucide.createIcons();
      if (error) { alert('Gagal menyimpan: '+error.message); return; }
      alert('Rekod berjaya disimpan dalam Supabase.');
      await loadPatients(); showDashboard();
    }

    async function loadPatients() {
      if (!currentUser) return;
      dashboard.innerHTML='<div class="text-center py-16 text-slate-500">Memuatkan rekod database...</div>';
      const { data, error } = await db.from('wound_records').select('patient_id,name,ic,age,last_visit,status').order('created_at',{ascending:false});
      if (error) { dashboard.innerHTML='<div class="bg-red-50 text-red-700 p-4 rounded-lg">Gagal memuatkan database: '+error.message+'</div>'; return; }
      patients=(data||[]).map(r=>({id:r.patient_id,name:r.name,ic:r.ic||'-',age:r.age,lastVisit:r.last_visit,status:r.status}));
      renderDashboard();
    }


    function getSavedConfig() {
      try { return JSON.parse(localStorage.getItem(CONFIG_KEY) || 'null'); }
      catch { return null; }
    }

    function saveConfig(url, key) {
      localStorage.setItem(CONFIG_KEY, JSON.stringify({ url, key }));
    }

    function clearConfig() {
      localStorage.removeItem(CONFIG_KEY);
      db = null;
      currentUser = null;
      renderSetup('Tetapan lama telah dipadam. Masukkan maklumat Supabase yang baharu.');
    }

    function renderSetup(message='') {
      authView.classList.remove('hidden'); dashboard.classList.add('hidden'); assessment.classList.add('hidden');
      const saved = getSavedConfig() || {};
      authView.innerHTML = `<div class="max-w-xl mx-auto bg-white border border-slate-200 shadow-sm rounded-2xl p-6 mt-12">
        <div class="flex items-center gap-3 mb-2"><div class="bg-indigo-100 text-indigo-700 p-2.5 rounded-xl">${icon('database','w-6 h-6')}</div><div><h2 class="text-2xl font-extrabold font-poppins text-slate-800">Sambungkan Database</h2><p class="text-sm text-slate-500">Hanya perlu dibuat sekali pada browser ini.</p></div></div>
        ${message ? `<div class="my-4 p-3 rounded-lg bg-amber-50 text-amber-800 text-sm">${message}</div>` : ''}
        <div class="mt-5 space-y-4">
          <div><label class="block text-sm font-semibold text-slate-700 mb-1">Supabase Project URL</label><input id="setupUrl" type="url" value="${saved.url || ''}" placeholder="https://projek-anda.supabase.co" class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm"></div>
          <div><label class="block text-sm font-semibold text-slate-700 mb-1">Publishable Key / Anon Key</label><textarea id="setupKey" rows="3" placeholder="sb_publishable_... atau eyJ..." class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm font-mono">${saved.key || ''}</textarea></div>
        </div>
        <div class="mt-5 p-4 bg-blue-50 border border-blue-100 rounded-xl text-sm text-blue-900"><p class="font-bold mb-1">Di mana hendak dapatkan maklumat ini?</p><p>Supabase Dashboard → Project Settings → API. Salin <strong>Project URL</strong> dan <strong>Publishable key</strong> atau <strong>anon public key</strong>.</p></div>
        <button id="connectDbBtn" class="mt-5 w-full py-3 bg-indigo-600 text-white rounded-lg font-bold flex items-center justify-center">${icon('plug','w-5 h-5 mr-2')} Sambung Database</button>
        <p class="text-xs text-slate-400 mt-3 text-center">Jangan gunakan service_role key.</p>
      </div>`;
      document.getElementById('connectDbBtn').onclick = connectDatabase;
      lucide.createIcons();
    }

    async function connectDatabase() {
      const url = document.getElementById('setupUrl').value.trim().replace(/\/$/, '');
      const key = document.getElementById('setupKey').value.trim();
      if (!/^https:\/\/[a-z0-9-]+\.supabase\.co$/i.test(url)) { alert('Project URL tidak sah.'); return; }
      if (key.length < 20) { alert('Publishable Key / Anon Key tidak lengkap.'); return; }
      try {
        db = window.supabase.createClient(url, key);
        const { error } = await db.auth.getSession();
        if (error) throw error;
        saveConfig(url, key);
        attachAuthListener();
        const { data } = await db.auth.getSession();
        await handleSession(data.session);
      } catch (err) { alert('Tidak dapat menyambung: ' + (err.message || err)); }
    }

    let authListenerAttached = false;
    function attachAuthListener() {
      if (!db || authListenerAttached) return;
      authListenerAttached = true;
      db.auth.onAuthStateChange((_event, session) => handleSession(session));
    }

    async function startApp() {
      const config = getSavedConfig();
      if (!config?.url || !config?.key) return renderSetup();
      try {
        db = window.supabase.createClient(config.url, config.key);
        attachAuthListener();
        const { data, error } = await db.auth.getSession();
        if (error) throw error;
        await handleSession(data.session);
      } catch (err) { renderSetup('Sambungan tersimpan tidak berjaya. Semak URL dan key Supabase.'); }
    }

    function renderAuth(message='') {
      authView.classList.remove('hidden'); dashboard.classList.add('hidden'); assessment.classList.add('hidden');
      authView.innerHTML=`<div class="max-w-md mx-auto bg-white border border-slate-200 shadow-sm rounded-2xl p-6 mt-16">
        <h2 class="text-2xl font-extrabold font-poppins text-slate-800">Log Masuk Database</h2>
        <p class="text-sm text-slate-500 mt-1 mb-5">Gunakan akaun Supabase untuk mengakses rekod anda.</p>
        ${message?`<div class="mb-4 p-3 rounded-lg bg-amber-50 text-amber-800 text-sm">${message}</div>`:''}
        <div class="space-y-4">${input('E-mel','authEmail','email','nama@email.com')}${input('Kata laluan','authPassword','password','Minimum 6 aksara')}</div>
        <div class="grid grid-cols-2 gap-3 mt-5"><button id="loginBtn" class="py-2.5 bg-indigo-600 text-white rounded-lg font-semibold">Log Masuk</button><button id="signupBtn" class="py-2.5 bg-white border border-indigo-200 text-indigo-700 rounded-lg font-semibold">Daftar Akaun</button></div>
      </div>`;
      document.getElementById('loginBtn').onclick=()=>authAction('login');
      document.getElementById('signupBtn').onclick=()=>authAction('signup');
      const reset=document.createElement('button'); reset.className='mt-4 w-full text-xs text-slate-500 hover:text-red-600'; reset.textContent='Tukar tetapan database'; reset.onclick=clearConfig; authView.firstElementChild.appendChild(reset);
      lucide.createIcons();
    }

    function getEmailRedirectUrl() {
      // Menggunakan alamat sebenar laman semasa, termasuk laluan GitHub Pages.
      // Contoh: https://username.github.io/nama-repository/
      return window.location.origin + window.location.pathname;
    }

    async function authAction(mode) {
      const email=value('authEmail').trim(), password=value('authPassword');
      if (!email || password.length<6) {
        alert('Masukkan e-mel dan kata laluan sekurang-kurangnya 6 aksara.');
        return;
      }

      let result;

      if (mode === 'signup') {
        result = await db.auth.signUp({
          email,
          password,
          options: {
            emailRedirectTo: getEmailRedirectUrl()
          }
        });
      } else {
        result = await db.auth.signInWithPassword({
          email,
          password
        });
      }

      if (result.error) {
        alert(result.error.message);
        return;
      }

      if (mode === 'signup' && !result.data.session) {
        renderAuth(
          'Akaun telah didaftarkan. Sila buka e-mel pengesahan yang terbaru. Selepas disahkan, anda akan kembali ke laman ini.'
        );
      }
    }

    async function handleSession(session) {
      currentUser=session?.user||null;
      document.getElementById('userLabel').textContent=currentUser ? currentUser.email : 'Belum log masuk';
      document.getElementById('logoutBtn').classList.toggle('hidden',!currentUser);
      if (currentUser) { authView.classList.add('hidden'); dashboard.classList.remove('hidden'); await loadPatients(); } else renderAuth();
    }

    function showAssessment(){ if(!currentUser)return renderAuth(); dashboard.classList.add('hidden'); assessment.classList.remove('hidden'); renderAssessment(); }
    function showDashboard(){ if(!currentUser)return renderAuth(); assessment.classList.add('hidden'); dashboard.classList.remove('hidden'); renderDashboard(); }

    document.getElementById('brandBtn').onclick = showDashboard;
    document.getElementById('logoutBtn').onclick = () => db && db.auth.signOut();
    startApp();
  </script>
</body>
</html>
